<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Задание 5</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    .container {
      background: #fff;
      padding: 16px;
      border: 1px solid #ccc;
      max-width: 600px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      margin-bottom: 12px;
    }

    .hint {
      font-size: 13px;
      margin-bottom: 16px;
      padding: 8px;
      border: 1px dashed #bbb;
    }

    .output-label {
      font-size: 13px;
      margin-bottom: 4px;
    }

    .output {
      min-height: 40px;
      padding: 8px;
      border: 1px solid #333;
      font-family: monospace;
      white-space: pre-wrap;
      background: #fafafa;
    }

    .placeholder {
      color: #777;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ввод с клавиатуры</h1>
    <div class="subtitle">
      Буквы автоматически переводятся в верхний регистр, цифры игнорируются.
    </div>
    <div class="hint">
      Нажимайте любые клавиши на клавиатуре. Попробуйте буквы и цифры.<br />
      <strong>Backspace</strong> стирает последний символ, <strong>Enter</strong> добавляет перенос строки.
    </div>
    <div class="output-label">Результат:</div>
    <div id="output" class="output">
      <span class="placeholder">Начните печатать</span>
    </div>
  </div>

  <script src="keyboard.js"></script>
</body>
</html>
